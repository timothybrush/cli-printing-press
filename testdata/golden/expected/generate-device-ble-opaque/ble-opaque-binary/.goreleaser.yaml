version: 2
project_name: ble-opaque-binary-pp-cli
changelog:
  disable: true
builds:
  - id: ble-opaque-binary-pp-cli
    main: ./cmd/ble-opaque-binary-pp-cli
    binary: ble-opaque-binary-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X ble-opaque-binary-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: ble-opaque-binary-pp-mcp
    main: ./cmd/ble-opaque-binary-pp-mcp
    binary: ble-opaque-binary-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: ble-opaque-binary-pp-cli
    repository:
      owner: contributors
      name: homebrew-tap
    homepage: "https://github.com/contributors/ble-opaque-binary-pp-cli"
    description: "BLE Opaque Binary Device device CLI"
    install: |
      bin.install "ble-opaque-binary-pp-cli"
      bin.install "ble-opaque-binary-pp-mcp"
