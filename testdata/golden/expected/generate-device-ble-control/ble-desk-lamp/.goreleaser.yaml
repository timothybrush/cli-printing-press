version: 2
project_name: ble-desk-lamp-pp-cli
changelog:
  disable: true
builds:
  - id: ble-desk-lamp-pp-cli
    main: ./cmd/ble-desk-lamp-pp-cli
    binary: ble-desk-lamp-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X ble-desk-lamp-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: ble-desk-lamp-pp-mcp
    main: ./cmd/ble-desk-lamp-pp-mcp
    binary: ble-desk-lamp-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: ble-desk-lamp-pp-cli
    repository:
      owner: contributors
      name: homebrew-tap
    homepage: "https://github.com/contributors/ble-desk-lamp-pp-cli"
    description: "BLE Desk Lamp device CLI"
    install: |
      bin.install "ble-desk-lamp-pp-cli"
      bin.install "ble-desk-lamp-pp-mcp"
